<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ripple Slider</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="preload" as="image" href="/img1.webp" />
    <link rel="preload" as="image" href="/img2.webp" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="cursor"></div>
    <div class="slider">
      <div class="vignette"></div>
      <div class="slide-content">
        <div class="slide-title">
          <h1>After the Rain</h1>
        </div>
        <div class="slide-description">
          <p>
            A girl waits at the edge of the platform, paperback in hand,
            watching puddles reflect a sky that has already moved on.
          </p>
        </div>
      </div>
      <div class="slide-counter">
        <span class="counter-current">01</span> / <span class="counter-total">07</span>
      </div>
      <div class="click-hint">Click anywhere</div>
    </div>
    <script type="module" src="/script.js"></script>
  </body>
</html>
